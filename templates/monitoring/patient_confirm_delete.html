{% extends "base.html" %}

{% block content %}
<div class="card">
    <h2>Delete Patient Record</h2>
    <p>Are you sure you want to delete <strong>{{ object.full_name }}</strong> ({{ object.hospital_id }})?</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Confirm Delete</button>
        <a href="{% url 'patient-detail' object.pk %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
