{% extends "base.html" %}

{% block content %}
<header class="page-header">
    <h1 class="page-title">{% if object %}Edit Patient Record{% else %}Create Patient Record{% endif %}</h1>
    <p class="page-meta">All changes are logged and monitored for anomalous activity.</p>
</header>

<div class="card">
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn">Save</button>
        <a href="{% url 'patient-list' %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
