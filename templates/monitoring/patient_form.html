{% extends "base.html" %}

{% block content %}
<div class="card">
    <h2>{% if object %}Edit Patient Record{% else %}Create Patient Record{% endif %}</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn">Save</button>
        <a href="{% url 'patient-list' %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
