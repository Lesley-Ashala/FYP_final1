{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ brand_name }} - Login</title>
    <link rel="stylesheet" href="{% static 'monitoring/css/app.css' %}">
</head>
<body style="margin:0;min-height:100vh;display:grid;place-items:center;background:#f4f7fb;">
    <main class="auth-shell" role="main" aria-label="HRMS login">
        <div class="auth-brand">
            <h1 class="brand-title">{{ brand_name }}</h1>
            <p class="brand-note">Authorized staff only. Access is monitored.</p>
        </div>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
