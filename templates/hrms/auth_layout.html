<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ brand_name }} - Login</title>
    <style>
        :root {
            --bg: #f4f7fb;
            --surface: #ffffff;
            --border: #d9e2ec;
            --text: #0f172a;
            --muted: #475569;
            --primary: #0b7285;
            --primary-dark: #0a6576;
            --danger: #b42318;
            --warning: #b54708;
            --shadow: 0 10px 24px rgba(15, 23, 42, 0.08);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Inter", "Roboto", "Segoe UI", sans-serif;
            color: var(--text);
            background: var(--bg);
            display: grid;
            place-items: center;
            padding: 16px;
        }

        .auth-shell {
            width: min(460px, 96vw);
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            box-shadow: var(--shadow);
            padding: 22px;
        }

        .auth-brand {
            margin-bottom: 12px;
        }

        .brand-title {
            margin: 0;
            font-size: 1.05rem;
            font-weight: 700;
        }

        .brand-note {
            margin: 4px 0 0;
            font-size: 0.8rem;
            color: var(--muted);
        }

        .auth-title {
            margin: 0;
            font-size: 1.1rem;
            font-weight: 700;
        }

        .auth-subtitle {
            margin: 6px 0 14px;
            color: var(--muted);
            font-size: 0.83rem;
        }

        .field {
            margin-bottom: 12px;
        }

        .field label {
            font-size: 0.76rem;
            color: #64748b;
            font-weight: 600;
            display: block;
            margin-bottom: 5px;
        }

        .input,
        .select {
            width: 100%;
            border: 1px solid #cbd5e1;
            border-radius: 10px;
            padding: 9px 10px;
            font-size: 0.86rem;
            color: #0f172a;
        }

        .input:focus,
        .select:focus {
            outline: none;
            border-color: #60a5fa;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.14);
        }

        .helper {
            margin-top: 4px;
            font-size: 0.75rem;
            color: #64748b;
        }

        .helper.error { color: var(--danger); }

        .row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            margin: 10px 0 14px;
            flex-wrap: wrap;
        }

        .checkbox {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            font-size: 0.8rem;
            color: #334155;
        }

        .link {
            font-size: 0.8rem;
            color: #1d4ed8;
            font-weight: 600;
            text-decoration: none;
        }

        .btn {
            border: 0;
            border-radius: 10px;
            background: var(--primary);
            color: #fff;
            font-size: 0.86rem;
            font-weight: 600;
            padding: 10px 12px;
            width: 100%;
            cursor: pointer;
        }

        .btn:hover { background: var(--primary-dark); }

        .notice {
            border-radius: 10px;
            border: 1px solid #dbeafe;
            background: #eff6ff;
            color: #1e3a8a;
            font-size: 0.79rem;
            padding: 9px 10px;
            margin-bottom: 12px;
        }

        .notice.error {
            border-color: #fecaca;
            background: #fff1f2;
            color: #991b1b;
        }

        .notice.warning {
            border-color: #fcd34d;
            background: #fffbeb;
            color: #92400e;
        }

        .state-grid {
            display: grid;
            gap: 8px;
            margin-top: 12px;
        }

        .state-item {
            border: 1px dashed #d7e3f0;
            background: #f8fafc;
            border-radius: 10px;
            padding: 8px;
            font-size: 0.76rem;
            color: #475569;
        }
    </style>
</head>
<body>
    <main class="auth-shell">
        <div class="auth-brand">
            <h1 class="brand-title">{{ brand_name }}</h1>
            <p class="brand-note">Authorized staff only. Access is monitored.</p>
        </div>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
