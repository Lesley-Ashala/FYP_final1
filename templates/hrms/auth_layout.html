{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ brand_name }} — Sign In</title>
    <link rel="stylesheet" href="{% static 'monitoring/css/app.css' %}">
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: var(--bg-app);
            /* Subtle dot grid pattern */
            background-image: radial-gradient(circle, var(--gray-300) 1px, transparent 1px);
            background-size: 28px 28px;
        }
        /* Override pattern with a centered gradient */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse 80% 60% at 50% -10%, var(--brand-50) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }
        main.auth-shell {
            position: relative;
            z-index: 1;
        }
    </style>
</head>
<body>
    <main class="auth-shell" role="main" aria-label="Authentication">

        <!-- Brand header -->
        <div class="auth-brand">
            <div style="display:flex;align-items:center;gap:10px;">
                <div style="width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,var(--brand-500),var(--brand-700));display:grid;place-items:center;color:#fff;font-weight:800;font-size:0.8rem;letter-spacing:0.04em;box-shadow:var(--shadow-brand);">HSR</div>
                <div>
                    <h1 class="brand-title">{{ brand_name }}</h1>
                    <p class="brand-note">Authorized staff only. Access is monitored.</p>
                </div>
            </div>
        </div>

        {% block content %}{% endblock %}

    </main>
</body>
</html>
