{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page_title }} | {{ brand_name }}</title>
    <link rel="stylesheet" href="{% static 'monitoring/css/app.css' %}">
</head>
<body>

<!-- Mobile sidebar overlay -->
<div class="sidebar-overlay" id="sidebar-overlay"></div>

<div class="app">
    <!-- ── Sidebar ── -->
    {% include "hrms/components/sidebar.html" %}

    <!-- ── Main content area ── -->
    <div class="content">
        {% include "hrms/components/topbar.html" %}

        <main class="page" role="main">
            {% if messages %}
                <ul class="messages" role="status" aria-live="polite">
                    {% for message in messages %}
                        <li class="{{ message.tags }}">{{ message }}</li>
                    {% endfor %}
                </ul>
            {% endif %}
            {% block content %}{% endblock %}
        </main>
    </div>
</div>

<!-- Toast host -->
<div id="toast-host" class="toast-host"></div>

<script>
(function () {
    /* ── Toast system ── */
    const toastHost = document.getElementById("toast-host");

    function pushToast(message, tone) {
        if (!toastHost) return;
        const el = document.createElement("div");
        el.className = "toast " + (tone || "info");
        el.textContent = message;
        toastHost.appendChild(el);
        setTimeout(() => { el.style.opacity = "0"; el.style.transform = "translateY(6px)"; }, 2600);
        setTimeout(() => el.remove(), 3000);
    }
    window.pushToast = pushToast;

    document.querySelectorAll("[data-toast]").forEach(btn => {
        btn.addEventListener("click", () =>
            pushToast(btn.getAttribute("data-toast"), btn.getAttribute("data-tone"))
        );
    });

    /* ── Server toasts (from DOM messages) ── */
    document.querySelectorAll(".messages li").forEach(li => {
        const text = (li.textContent || "").trim();
        if (!text) return;
        const tags = li.className || "";
        const tone = tags.includes("error") ? "error"
            : tags.includes("warning") ? "warning" : "success";
        pushToast(text, tone);
    });

    /* ── Modal system ── */
    document.querySelectorAll("[data-open-modal]").forEach(btn => {
        btn.addEventListener("click", () => {
            const id = btn.getAttribute("data-open-modal");
            const modal = document.getElementById(id);
            if (modal) modal.classList.add("open");
        });
    });

    document.querySelectorAll("[data-close-modal]").forEach(btn => {
        btn.addEventListener("click", () => {
            const modal = btn.closest(".modal-backdrop");
            if (modal) modal.classList.remove("open");
        });
    });

    document.querySelectorAll(".modal-backdrop").forEach(backdrop => {
        backdrop.addEventListener("click", e => {
            if (e.target === backdrop) backdrop.classList.remove("open");
        });
    });

    /* ── Mobile sidebar toggle ── */
    const sidebar  = document.getElementById("app-sidebar");
    const overlay  = document.getElementById("sidebar-overlay");
    const hamburger = document.getElementById("sidebar-toggle");

    function openSidebar() {
        sidebar && sidebar.classList.add("open");
        overlay && overlay.classList.add("open");
        document.body.style.overflow = "hidden";
    }
    function closeSidebar() {
        sidebar && sidebar.classList.remove("open");
        overlay && overlay.classList.remove("open");
        document.body.style.overflow = "";
    }

    hamburger && hamburger.addEventListener("click", openSidebar);
    overlay   && overlay.addEventListener("click", closeSidebar);

    /* Close sidebar on nav-item click (mobile) */
    document.querySelectorAll(".nav-item").forEach(item => {
        item.addEventListener("click", () => {
            if (window.innerWidth < 769) closeSidebar();
        });
    });
})();
</script>
</body>
</html>
