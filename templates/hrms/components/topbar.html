<header class="topbar">
    <div>
        <h1 class="topbar-title">{{ page_name }}</h1>
        <p class="topbar-subtitle">{{ page_note }}</p>
    </div>
    <div class="topbar-right">
        <span class="pill lock">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="11" width="18" height="10" rx="2"></rect>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
            </svg>
            Session expires in {{ session_expiry }}
        </span>
        <span class="pill security">{{ demo_role_label }}</span>
        <span class="pill">{{ demo_user }}</span>
        <a href="{% url 'hrms-logout' %}" class="btn secondary">Log out</a>
    </div>
</header>
