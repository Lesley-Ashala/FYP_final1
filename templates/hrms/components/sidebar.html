<aside class="sidebar" id="app-sidebar" role="navigation" aria-label="Sidebar navigation">

    <!-- Brand -->
    <div class="brand">
        <div class="brand-logo">HSR</div>
        <div>
            <p class="brand-title">{{ brand_name }}</p>
            <p class="brand-subtitle">Hospital Secure Records</p>
        </div>
    </div>

    <!-- Navigation -->
    <div class="nav-group">
        <p class="nav-label">Navigation</p>
        {% for item in nav_items %}
            <a href="{% url item.url_name %}"
               class="nav-item {% if active_url_name == item.url_name %}active{% endif %}"
               aria-current="{% if active_url_name == item.url_name %}page{% endif %}">
                {% include "hrms/components/icon.html" with icon=item.icon %}
                <span>{{ item.label }}</span>
            </a>
        {% endfor %}
    </div>

    <!-- Security status -->
    <div class="nav-footnote">
        <strong>Security Status</strong>
        Last policy sync: 09:10 UTC<br>
        Endpoint posture: <span style="color:var(--success-500);font-weight:600;">compliant</span>
    </div>

    <!-- Role info -->
    <div class="nav-footnote">
        <strong>Active Role</strong>
        {{ demo_role_label }}
    </div>

</aside>
